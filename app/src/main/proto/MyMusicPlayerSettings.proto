
syntax = "proto3";
option java_package = "com.bdlepla.android.mymusicplayer";
option java_outer_classname = "CurrentListProto";
option java_multiple_files = true;

message MyMusicPlayerSettings {
  int64 currentIndex = 1; // index into songIds that is playing
  int64 currentPosition = 2; // in milliseconds from start of currently playing song
  repeated int64 songIds = 3; // the list of item Ids in the order to play
}
